<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Project Blog Post</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
  --bg: #f4f0ec;
  --card: #fffaf7;
  --primary: #8b1a2e;
  --primary-dark: #5f0413;
  --accent: #d4a5ad;
  --text: #2d2d2d;
  --shadow: rgba(95, 4, 19, 0.12);

  --paper-noise: url("https://www.transparenttextures.com/patterns/paper-fibers.png");
}

  /* 🌀 Loading Screen */
    #loader {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s ease;
    }

    .spinner {
      width: 60px;
      height: 60px;
      border: 6px solid var(--accent);
      border-top: 6px solid var(--primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

@keyframes float {
  0%, 100% { transform: translateY(0) rotate(-0.3deg); }
  50% { transform: translateY(-6px) rotate(0.2deg); }
}

    #mainContent {
      display: none;
      padding: 2rem;
    }
    * {
      box-sizing: border-box;
      font-family: 'DM Sans', sans-serif;
      margin: 0;
      padding: 0;
    }

    body {
  color: var(--text);
  padding: 2rem;
  background:
    var(--bg),
    var(--paper-noise);

  background-blend-mode: multiply;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: var(--paper-noise);
  opacity: 0.06;
  pointer-events: none;
}

    .container {
animation: float 6s ease-in-out infinite;
   max-width: 800px;
  margin: auto;
  background: var(--card);
  padding: 2.5rem;
  border-radius: 12px;
  box-shadow:
    0 20px 50px rgba(0,0,0,0.08),
    inset 0 0 0 1px rgba(139, 26, 46, 0.08);
  transform: rotate(-0.3deg);
}

   h1 {
  font-family: Georgia, serif;
  letter-spacing: -0.5px;
  transform: rotate(-0.5deg);
}

@import url('https://fonts.googleapis.com/css2?family=Caveat:wght@500;600&display=swap');

.date {
  font-family: "Caveat", cursive;
  color: var(--primary-dark);
  transform: rotate(1deg);
}

    .cover-img {
  border-radius: 10px;
  box-shadow:
    0 10px 30px rgba(0,0,0,0.12);
  filter: contrast(1.05) saturate(0.9);
  transform: rotate(0.6deg);
}

    .video-container {
      position: relative;
      padding-bottom: 56.25%;
      height: 0;
      overflow: hidden;
      border-radius: 15px;
      margin-bottom: 1.5rem;
    }

    .video-container iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
      border-radius: 15px;
    }

    .content {
      font-size: 1rem;
      line-height: 1.8;
      margin-bottom: 2rem;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .tag {
  background: var(--primary);
  color: white;
  padding: 0.4rem 0.8rem;
  border-radius: 999px;
  font-size: 0.8rem;
  transform: rotate(-1deg);
  box-shadow: 2px 6px 12px rgba(0,0,0,0.12);
}

.tag:hover {
  transform: scale(1.05) rotate(0deg);
}

.back-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;

  margin-top: 1.5rem;

  padding: 0.7rem 1.2rem;

  text-decoration: none;

  background: var(--card);
  color: var(--primary-dark);

  border: 1px solid rgba(139, 26, 46, 0.25);
  border-radius: 12px;

  box-shadow:
    0 10px 20px rgba(0,0,0,0.08),
    inset 0 0 0 1px rgba(255,255,255,0.4);

  letter-spacing: 1px;
  text-transform: uppercase;
  font-size: 0.85rem;

  transform: rotate(-1deg);

  transition: all 0.3s ease;
}

.back-btn:hover {
  transform: rotate(0deg) scale(1.03);

  background: var(--primary);
  color: white;

  box-shadow: 0 12px 30px rgba(95, 4, 19, 0.35);
}

    .post-nav {
      display: flex;
      justify-content: space-between;
      margin-top: 2rem;
    }

    .nav-link {
  text-decoration: none;
  color: var(--primary);
  font-weight: bold;
  background: rgba(139, 26, 46, 0.08);
  padding: 0.6rem 1rem;
  border-radius: 12px;
  transition: 0.3s ease;
}

.nav-link:hover {
  background: rgba(139, 26, 46, 0.15);
}

.tape {
  position: fixed;
  top: 40px;
  left: 60px;

  width: 90px;
  height: 20px;

  background: rgba(255,255,255,0.4);

  transform: rotate(-12deg);
  opacity: 0.7;
}

.stamp {
  position: fixed;
  bottom: 40px;
  right: 60px;

  font-family: monospace;
  font-size: 12px;

  border: 1px dashed var(--primary);
  padding: 6px 10px;

  transform: rotate(8deg);
}
  </style>
</head>
<body>

  <!-- 🌀 Loading Spinner -->
  <div id="loader">
    <div class="spinner"></div>
  </div>

  <!-- 👀 Actual Page Content -->
  <div id="mainContent">
    <div class="container">
      <h1>Macropad</h1>
      <div class="date">DOB</div>
      <a href="Projects.html" class="back-btn">Projects</a>
      <img src="" alt="Project 3" class="card-img">
      <div class="content">

    <div class="tags">
      <div class="tag">#personal</div>
      <div class="tag">#Hardware</div>
      <div class="tag">#Automation</div>
    </div>

    <a href="index.html" class="back-btn">← Back to Home</a>
  </div>

  <script>
    // Wait until everything is loaded
    window.addEventListener('load', () => {
      const loader = document.getElementById('loader');
      const main = document.getElementById('mainContent');
      loader.style.opacity = '0';
      setTimeout(() => {
        loader.style.display = 'none';
        main.style.display = 'block';
      }, 500); // Wait for fade-out
    });
  </script>
</body>
</html>
